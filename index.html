<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chi Chi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#ff4e91,#ff9ecf);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    animation: floatUp 6s linear infinite;
    opacity:0.8;
}

@keyframes floatUp{
    0%{ transform: translateY(0) scale(1); opacity:1;}
    100%{ transform: translateY(-100vh) scale(1.5); opacity:0;}
}

.container{
    z-index:2;
    padding:20px;
    max-width:90%;
}

h1{
    font-family:'Dancing Script', cursive;
    font-size:3rem;
    animation: fadeIn 2s ease-in-out;
}

h2{
    margin-top:15px;
    font-weight:300;
    animation: fadeIn 3s ease-in-out;
}

button{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff2e7e;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ffe6f2;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Love Letter Popup */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#ff2e7e;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:350px;
    display:none;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
    animation: pop 0.5s ease;
}

@keyframes pop{
    from{ transform:translate(-50%,-60%) scale(0.5); opacity:0;}
    to{ transform:translate(-50%,-50%) scale(1); opacity:1;}
}

.popup h3{
    font-family:'Dancing Script', cursive;
    font-size:1.8rem;
    margin-bottom:10px;
}

.popup button{
    margin-top:15px;
    background:#ff2e7e;
    color:white;
}

@media(max-width:600px){
    h1{ font-size:2.2rem; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday My Love 💖</h1>
    <h1>Vidushee 🎂✨</h1>
    <h2>You are my today, tomorrow & forever ❤️</h2>
    <button onclick="surprise()">Open Your Surprise 💌</button>
</div>

<div class="popup" id="loveLetter">
    <h3>My Dearest Chi Chi 💕</h3>
    <p>
        On your special day, I just want you to know  
        you are the most precious gift in my life.  
        Your smile lights up my world.  
        I promise to always love you, protect you,  
        and stand by your side forever ❤️
    </p>
    <button onclick="closeLetter()">I Love You Too 💖</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function surprise(){
    document.getElementById("loveLetter").style.display="block";

    confetti({
        particleCount:300,
        spread:150,
        origin:{ y:0.6 }
    });
}

function closeLetter(){
    document.getElementById("loveLetter").style.display="none";
}

/* Generate Floating Hearts */
setInterval(()=>{
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+15+"px";
    heart.style.animationDuration=Math.random()*3+3+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
},500);
</script>

</body>
</html>
